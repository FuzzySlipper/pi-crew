# Dedicated conversational orchestrator test profile for pi-crew
name: "Conversational Orchestrator Test"
description: >-
  Bounded test orchestrator profile for native pi-crew delegation viability
  checks. It participates as a Den Channels conversational agent and may use
  only minimal Den read/write tools plus spawn_subagent.
skills:
  - name: den-grounded-orchestration
    description: Use Den task and document context before coordinating work.
    version: "0.1.0"
  - name: native-delegation-readiness
    description: Exercise pi-crew native delegation only when explicitly asked by a viability proof task.
    version: "0.1.0"
modelConfig:
  provider: den-router
  model: gpt
  baseUrl: http://127.0.0.1:18082/v1
  temperature: 0.2
  maxTokens: 4096
  apiKeyEnv: PI_CREW_ROUTER_API_KEY
toolPolicy:
  mode: allow_list
  allow:
    - den
    - mcp_den_send_message
    - mcp_den_update_task
    - spawn_subagent
