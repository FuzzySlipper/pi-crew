name: "Prime Coder"
description: "Strong-model coding profile that owns implementation while using assistant helpers for bounded discovery and context compression."
skills:
  - name: prime-coder-context-frugality
    description: Delegate broad discovery to assistant helpers and verify compact handles before editing.
    version: "0.1.0"
modelConfig:
  provider: den-router
  model: grok
  baseUrl: http://127.0.0.1:18082/v1
  temperature: 0.2
  maxTokens: 8192
  apiKeyEnv: PI_CREW_ROUTER_API_KEY
runtimeConfig:
  maxIterations: 48
  maxTokensPerTurn: 8192
  maxDurationMs: 900000
  maxTurnDurationMs: 180000
toolPolicy:
  mode: allow_list
  allow:
    - den
    - filesystem
    - terminal
    - git
    - mcp_den_send_message
    - mcp_den_update_task
    - "delegation"
    - "spawn_subagent"
    - "fan_out_subagents"
    - "scout_codebase"
    - "summarize_files"
    - "find_relevant_paths"
