# pi-crew gateway — default configuration template
#
# Every field has a safe default. Den connection and database path
# are the only settings that typically need per-environment overrides.
# Use environment variables (PI_DB_PATH, PI_DEN_CORE_URL, etc.) for
# secrets and host-specific values.

# ── Installed layout ─────────────────────────────────────────────
# Production pooled-worker installs use this root. The service reads
# /home/agents/pi-crew/config.yaml and worker profile definitions from
# /home/agents/pi-crew/profiles. Development/test runs may still pass an
# explicit --config path and omit profiles.root to use package defaults.
install:
  root: "/home/agents/pi-crew"

# Uncomment in installed config after creating the directory:
# profiles:
#   root: "/home/agents/pi-crew/profiles"

# ── Den Core / Channels ───────────────────────────────────────────
den:
  # REST API base URL for Den Core (required at startup by default).
  # Set PI_DEN_CORE_URL env var to override.
  coreUrl: "http://192.168.1.10:18080/den-core-api"

  # Den Channels HTTP base URL for live direct-agent-events cursor polling.
  # Use http:// or https:// for HTTP cursor/polling; ws:// or wss:// remains
  # supported only for legacy WebSocket deployments. Set to empty string to use
  # a simulated connection (tests/dev only).
  channelsUrl: "http://192.168.1.10:18081"

  # Auth token for the Den Channels Gateway.
  # Override via PI_DEN_CHANNELS_TOKEN env var. Do NOT commit real tokens.
  channelsToken: ""

  # ── HTTP cursor/polling mode (used when channelsUrl is http:// or https://) ──
  # Den Channels project ID for direct-agent-events polling scope.
  channelsProjectId: "pi-crew"

  # Member identity registered in Den Channels for event delivery.
  channelsMemberIdentity: "pi-crew-runner"

  # Polling interval in milliseconds for direct-agent-events consumption.
  channelsPollIntervalMs: 5000

  # Maximum events to fetch per poll.
  channelsPollLimit: 10

  # ── Den Channels v8 membership/subscription registration ──
  # Public ordinary channel where this pi-crew conversational agent is visible.
  channelsSubscriptionChannelId: "642"

  # Stable public member/profile/role metadata for this runtime.
  channelsProfileIdentity: "pi-crew-runner"
  channelsMemberRole: "runner"

  # Concrete runtime/session binding for the active ordinary-channel subscription.
  # Override these per deployment if multiple pi-crew runtimes run side by side.
  channelsAgentInstanceId: "pi-crew-runner-live"
  channelsSessionOwnerId: "owner:den-k8plus:pi-crew-runner"
  channelsSessionId: "sess-pi-crew-runner-live"
  channelsSubscriptionIdentity: "pi-crew-runner:ordinary:sess-pi-crew-runner-live"

  # Compatibility fallback for pre-v8 Channels deployments. Keep false for green path.
  channelsAllowLegacyDirectPolling: false

  # Live Channels reconnect / heartbeat settings.
  channelsRetryMaxAttempts: 5
  channelsRetryBaseDelayMs: 200
  channelsRetryMaxDelayMs: 30000
  channelsPingIntervalMs: 30000
  channelsConnectionTimeoutMs: 10000

  # Refuse startup if Den Core is unreachable (default: true).
  requiredAtStartup: true

# ── MCP server (den-mcp) ──────────────────────────────────────────
mcp:
  # Transport kind: "stdio" or "streamable-http".
  transport: "streamable-http"

  # MCP server endpoint (when transport is streamable-http).
  endpoint: "http://192.168.1.10:5199/mcp"

  # Request timeout in milliseconds.
  requestTimeout: 30000

  # Maximum MCP client reconnect attempts.
  maxReconnectAttempts: 3

  # Base delay (ms) for exponential backoff reconnection.
  reconnectBaseDelay: 1000

# ── Local runtime database ────────────────────────────────────────
database:
  # Absolute path to the SQLite runtime database.
  # Override via PI_DB_PATH env var.
  path: "/home/agents/pi-crew/runtime.db"

  # Enable WAL mode for read concurrency.
  wal: true

# ── Runtime response mode ─────────────────────────────────────────
# Default remains echo-compatible for safe deployment. Set responseMode to
# "deterministicTool" and enable the arithmetic tool only for the narrow
# #2020/#2031 non-echo smoke path.
runtime:
  responseMode: "echo"
  deterministicTool:
    arithmeticToolEnabled: false

# ── Session / instance limits ─────────────────────────────────────
sessions:
  # Maximum total instances across all profiles.
  maxTotal: 16

  # Maximum instances per profile.
  maxPerProfile: 4

  # Idle timeout in milliseconds before an instance is eligible for eviction.
  idleTimeoutMs: 28800000  # 8 hours

  # Default profile ID for new conversational sessions created as
  # a visible fallback when no existing session matches the channel.
  fallbackProfileId: "system-architect"

# ── Logging ───────────────────────────────────────────────────────
logging:
  # Minimum log level: "debug", "info", "warn", or "error".
  level: "info"

  # Output JSON to stdout instead of human-readable text.
  json: false

# ── Health check endpoint ─────────────────────────────────────────
health:
  # Port the health-check HTTP server listens on.
  # Override via PI_HEALTH_PORT env var.
  port: 9236

  # Host/IP to bind the health server to.
  # Override via PI_HEALTH_HOST env var.
  host: "127.0.0.1"

# ── Tool policy defaults ─────────────────────────────────────────
# Applied to every worker session unless overridden by profile.
toolPolicy:
  # Tool allowlist (empty = all tools allowed, subject to denylist).
  allowedTools: []

  # Explicitly denied tools.
  deniedTools: []

  # Allowed network hosts (empty = all allowed).
  allowedHosts: []

  # Explicitly denied hosts.
  deniedHosts: []

# ── Worker role→profile mappings ─────────────────────────────────
# Maps Den worker roles to profile IDs. WorkerRuntime resolves
# profileId through this config instead of a hardcoded switch.
# Validated at startup: duplicate roles are rejected.
workers:
  bindings:
    - role: "packet-auditor"
      profileId: "packet-auditor"
    - role: "packet_auditor"
      profileId: "packet-auditor"
    - role: "coder"
      profileId: "spawned-coder"
      # Production LLM worker mode is fail-closed: uncomment all fields together
      # after Den MCP tools and model endpoint are available to this runtime.
      # config:
      #   executionMode: "llmAgent"
      #   modelProvider: "local-openai-compatible"
      #   modelName: "Qwen3.6-35B-A3B-MTP-GGUF"
      #   modelBaseUrl: "http://192.168.1.23:13305/v1"
    - role: "reviewer"
      profileId: "spawned-reviewer"
    - role: "validator"
      profileId: "spawned-validator"
    - role: "drift_checker"
      profileId: "worker-drift_checker"

# ── Cron (DEFERRED — not required for this task) ──────────────────
# cron:
#   # Future cron integration hook.
#   enabled: false

# ── Memory / Blackboard (DEFERRED — not required for this task) ───
# memory:
#   # Future memory integration hook. pi-memory is deferred.
#   enabled: false
